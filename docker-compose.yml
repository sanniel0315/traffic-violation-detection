# =============================================================================
# 交通影像分析系統 - Docker Compose
# =============================================================================

services:
  # API 服務 (主要服務)
  api:
    build: .
    image: traffic-api:latest
    container_name: traffic-api
    runtime: nvidia
    volumes:
      - ./:/workspace
      - ./models:/workspace/models
      - ./storage:/workspace/storage
      - /home/mic-711/Downloads:/workspace/host_downloads:ro
    working_dir: /workspace
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Taipei
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - FRIGATE_HOST=frigate
      - FRIGATE_PORT=5000
      - MODEL_DIR=/workspace/models
      - DETECT_MODEL_ENGINE=yolov8n.engine
      - DETECT_MODEL_PT=yolov8n.pt
    command: python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on:
      - frigate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frigate NVR 服務
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable-tensorrt-jp6
    container_name: frigate
    runtime: nvidia
    privileged: true
    shm_size: "512mb"
    volumes:
      - ./config/frigate:/config
      - ./storage/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555"
    environment:
      - TZ=Asia/Taipei
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD:-}
    restart: unless-stopped

  # 開發環境 (可選)
  dev:
    build: .
    image: traffic-api:latest
    container_name: traffic-dev
    runtime: nvidia
    volumes:
      - ./:/workspace
      - ./models:/workspace/models
      - /home/mic-711/Downloads:/workspace/host_downloads:ro
    working_dir: /workspace
    environment:
      - TZ=Asia/Taipei
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_DIR=/workspace/models
      - DETECT_MODEL_ENGINE=yolov8n.engine
      - DETECT_MODEL_PT=yolov8n.pt
    stdin_open: true
    tty: true
    profiles:
      - dev

networks:
  default:
    driver: bridge
