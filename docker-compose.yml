# =============================================================================
# 交通影像分析系統 - Docker Compose
# =============================================================================

services:
  # API 服務 (主要服務)
  api:
    build: .
    image: traffic-api:latest
    container_name: traffic-api
    runtime: nvidia
    # 資料目錄走 host 端 ./models ./storage ./output ./data 的實體路徑或 symlink；
    # 想把它們放在 NVMe/外接硬碟，直接在 host 建 symlink 指過去即可（見 scripts/init_dirs.sh）
    volumes:
      - ./:/workspace
      - ${HOST_SITE_PACKAGES:-/home/ubuntu/.local/lib/python3.10/site-packages}:/opt/host-packages:ro
      - ${HOST_EASYOCR:-/home/ubuntu/.EasyOCR}:/root/.EasyOCR:ro
    working_dir: /workspace
    network_mode: host
    environment:
      - TZ=Asia/Taipei
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONPATH=/usr/local/lib/python3.10/dist-packages:/usr/lib/python3/dist-packages:/opt/host-packages
      - FRIGATE_HOST=localhost
      - FRIGATE_PORT=5000
      - MODEL_DIR=/workspace/models
      - DETECT_MODEL_ENGINE=yolov8n.engine
      - DETECT_MODEL_PT=yolov8n.pt
    command: python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    depends_on:
      - frigate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frigate NVR 服務
  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.16.4-tensorrt-jp6
    container_name: frigate
    runtime: nvidia
    privileged: true
    network_mode: host
    shm_size: "512mb"
    volumes:
      - ./config/frigate:/config
      - ./storage/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Taipei
      - FRIGATE_RTSP_PASSWORD=${FRIGATE_RTSP_PASSWORD:-}
      - FRIGATE_CAM2_PASSWORD=1qaz@WSX
      - ORT_DISABLE_ALL=1
      - ONNXRUNTIME_DISABLE=1
      - MALLOC_CHECK_=0
    restart: unless-stopped

  # MQTT Broker (embedded 模式使用)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    network_mode: host
    volumes:
      - ./config/mosquitto:/mosquitto/config
      - ./storage/mosquitto:/mosquitto/data
      - ./storage/mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # 開發環境 (可選)
  dev:
    build: .
    image: traffic-api:latest
    container_name: traffic-dev
    runtime: nvidia
    volumes:
      - ./:/workspace
      - ./models:/workspace/models
    working_dir: /workspace
    environment:
      - TZ=Asia/Taipei
      - NVIDIA_VISIBLE_DEVICES=all
      - MODEL_DIR=/workspace/models
      - DETECT_MODEL_ENGINE=yolov8n.engine
      - DETECT_MODEL_PT=yolov8n.pt
    stdin_open: true
    tty: true
    profiles:
      - dev

networks:
  default:
    driver: bridge
