# MQTT broker config for traffic-violation-detection
listener 1883 0.0.0.0
listener 9001 0.0.0.0
protocol websockets

# 可先用 anonymous (方便除錯)，正式部署請 allow_anonymous false + password_file
allow_anonymous true
# password_file /mosquitto/config/passwords.txt

persistence true
persistence_location /mosquitto/data/
log_type error
log_type warning
log_type notice
log_dest stdout
